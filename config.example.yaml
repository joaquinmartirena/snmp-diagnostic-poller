# Example configuration. Copia a config.yaml y editá con tus dispositivos reales:
#
#     cp config.example.yaml config.yaml
#
# config.yaml está git-ignored: las IPs / community strings productivos nunca
# se commitean. NO pongas dispositivos reales en este archivo de ejemplo.
#
# Uso:
#     itstoolkit monitor --config config.yaml
#     itstoolkit probe   --config config.yaml     # primer device del YAML
#
# Familias registradas (ver `itstoolkit/devices/`):
#   - vms_ntcip1203  (VMS / DMS NTCIP 1203 v3 — Daktronics, Chainzone, ...)
#   - semex_c5000    (controlador SEMEX C5000, NTCIP 1202)
#
# Compat con YAMLs viejos: el campo `type:` con valores `VMS_NTCIP1203`,
# `VMS_NTCIP1203_DAKTRONICS`, `VMS_NTCIP1203_CHAINZONE`, `SEMEX_C5000_V1`
# sigue funcionando y se mapea automáticamente a `family` + `vendor`.

devices:
  # NTCIP 1203 variable message sign — Daktronics
  - name: vms_example_dakt
    family: vms_ntcip1203
    vendor: daktronics
    type_label: VMS_NTCIP1203_DAKTRONICS  # cómo aparece en TYPE= del log
    ip: 192.0.2.10
    port: 161
    community: public
    interval_seconds: 60

  # NTCIP 1203 variable message sign — Chainzone
  - name: vms_example_chainzone
    family: vms_ntcip1203
    vendor: chainzone
    type_label: VMS_NTCIP1203_CHAINZONE
    ip: 192.0.2.11
    port: 161
    community: public
    interval_seconds: 60

  # SEMEX C5000 traffic signal controller
  - name: semex_example
    family: semex_c5000
    ip: 192.0.2.20
    port: 161
    community: public
    alarm_interval_seconds: 30
    cycle_interval_seconds: 2
    cycle_change_log: false
