# Example VMS PoC panel config. Copy to panel.<name>.yaml and edit.
#
# Real panel configs are git-ignored; do NOT put production IPs / community
# strings in this example file.

panel:
  name: dakt_example
  type: VMS_NTCIP1203_DAKTRONICS   # resolves to the DaktronicsVanguard OID provider
  ip: 192.0.2.10                   # replace with the panel IP
  port: 161
  community: public                # replace with the real community string

# Write safety gate. A scenario with requires_write = True only runs when
# confirm_write is true here AND --confirm-write is passed on the CLI.
confirm_write: false

# Scenarios to run (names match modules under pocs/vms/scenarios/).
scenarios: []
